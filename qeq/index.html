<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saga: ¿Quién es Quién?</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .games-grid {
            margin-top: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            padding: 0 20px;
        }

        .hub-card {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hub-card:hover {
            transform: translateY(-10px);
        }

        .hub-card .card-emoji { font-size: 5rem; padding-bottom: 0; }
        .hub-card h3 { font-size: 1.5rem; margin-top: 10px; color: var(--border-bubbly); text-shadow: 2px 2px 0 #FFF; }
        
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            overflow-y: auto;
            padding-bottom: 50px;
        }

        .back-btn {
            position: absolute;
            top: 20px; left: 20px;
            font-size: 2rem;
            text-decoration: none;
            background: #FFF; border-radius: 50%;
            width: 60px; height: 60px; display: flex; justify-content: center; align-items: center;
            border: 4px solid var(--border-bubbly); border-bottom-width: 6px;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
        }
        .back-btn:active { transform: translateY(4px); border-bottom-width: 4px; }

        header { justify-content: center; width: 100%; }
        header p { margin-top: 5px; }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">⬅️</a>

    <div class="main-container">
        
        <header style="flex-direction: column;">
            <h1>🕵️‍♂️ La Colección "Quién es Quién" 🕵️‍♀️</h1>
            <p>Elige una de las barajas para empezar a jugar cruzando mensajes</p>
        </header>

        <main class="games-grid">
            
            <a href="quienEsQuienCineEspañol.html" class="card hub-card">
                <div class="card-emoji">🎬</div>
                <h3>Cine Español</h3>
            </a>

            <a href="quienEsQuienPoliticaEspañola.html" class="card hub-card">
                <div class="card-emoji">🏛️</div>
                <h3>Política España</h3>
                <p style="font-size: 0.8rem">vs Jugador Real</p>
            </a>

            <a href="quienEsQuienPoliticaEspañolaBot.html" class="card hub-card">
                <div class="card-emoji">🤖</div>
                <h3>Política España Bot</h3>
                <p style="font-size: 0.8rem">vs La Máquina</p>
            </a>

            <a href="quienEsQuienTipicalMurcia.html" class="card hub-card">
                <div class="card-emoji">🍋</div>
                <h3>Tipical Murcia</h3>
            </a>

            <a href="quienEsQuienTipicalSpanish.html" class="card hub-card">
                <div class="card-emoji">🥘</div>
                <h3>Tipical Spanish</h3>
            </a>

        </main>
    </div>

</body>
</html>
